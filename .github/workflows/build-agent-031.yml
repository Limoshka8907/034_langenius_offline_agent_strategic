name: Build Agent 0.0.31 Offline Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl unzip zip python3 python3-pip

      - name: Clone repackager
        run: |
          git clone https://github.com/junjiem/dify-plugin-repackaging.git repack
          chmod +x repack/plugin_repackaging.sh

      - name: Build offline package
        run: |
          cd repack
          ./plugin_repackaging.sh -p manylinux2014_x86_64 market langgenius agent 0.0.31
          mkdir -p ../out
          find . -name "*.difypkg" -type f -exec cp {} ../out/ \;
          ls -lh ../out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: langgenius-agent-0.0.31-offline
          path: out/*.difypkg
